name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test tests/WinLangSwitcher.Tests/WinLangSwitcher.Tests.csproj -c Release --nologo

      - name: Publish Native AOT
        run: dotnet publish src/WinLangSwitcher/WinLangSwitcher.csproj -c Release -r win-x64 --nologo

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src/WinLangSwitcher/bin/Release/net10.0-windows/win-x64/publish/WinLangSwitcher.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
