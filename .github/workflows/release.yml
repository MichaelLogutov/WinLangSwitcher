name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test tests/WinLangSwitcher.Tests/WinLangSwitcher.Tests.csproj -c Release --nologo

      - name: Publish Native AOT
        run: dotnet publish src/WinLangSwitcher/WinLangSwitcher.csproj -c Release -r win-x64 --nologo

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            src/WinLangSwitcher/bin/Release/net10.0-windows/win-x64/publish/WinLangSwitcher.exe
            install.ps1
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
