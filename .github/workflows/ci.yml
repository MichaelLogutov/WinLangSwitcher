name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test tests/WinLangSwitcher.Tests/WinLangSwitcher.Tests.csproj -c Release --nologo

      - name: Publish (Native AOT smoke test)
        run: dotnet publish src/WinLangSwitcher/WinLangSwitcher.csproj -c Release -r win-x64 --nologo

      - name: Upload AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinLangSwitcher-win-x64
          path: src/WinLangSwitcher/bin/Release/net10.0-windows/win-x64/publish/WinLangSwitcher.exe
          if-no-files-found: error
